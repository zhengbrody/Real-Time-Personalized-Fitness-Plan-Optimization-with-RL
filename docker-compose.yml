version: '3.8'

services:
  # Zookeeper - Required for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: profit-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profit-network

  # Kafka - For online learning pipeline
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: profit-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - profit-network

  # Redis - For feature store caching
  redis:
    image: redis:7-alpine
    container_name: profit-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - profit-network

  # API Server - FastAPI backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: profit-api
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/fitness.db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./models:/app/models
    command: python src/serving/api_server.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profit-network

  # Web Interface - Streamlit
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: profit-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AGENT_MODEL=${AGENT_MODEL:-gpt-4}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./web_app_pro.py:/app/web_app_pro.py
      - ./data:/app/data
    command: streamlit run web_app_pro.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profit-network

  # Kafka Consumer - Online learning
  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile
      target: consumer
    container_name: profit-kafka-consumer
    depends_on:
      kafka:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATABASE_URL=sqlite:///data/fitness.db
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./models:/app/models
    command: python src/online_learning/kafka_consumer.py
    restart: unless-stopped
    networks:
      - profit-network

networks:
  profit-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  kafka-data:
    driver: local
  zookeeper-data:
    driver: local
